spring:
  application:
    name: course-management
  datasource:
    url: "jdbc:postgresql://localhost:5432/course-mgmt-db"
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    open-in-view: false
    show-sql: true
    hibernate:
      ddl-auto: drop-and-create
    properties:
      hibernate:
        format_sql: true